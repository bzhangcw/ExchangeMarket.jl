# Method catalog + run set for the revealed-preference experiment driver
# (run_test.jl; figures rendered by run_plot.jl).
#
# This file is the single source of truth for which methods the driver can run
# and how each one is configured and plotted. It is loaded at startup; pass
# `--preset PATH` to use a different file. Command-line flags (--iterlimit,
# --tol-obj, --classes, --sample-size, --ad-*, …) override individual kwargs at
# run time, so the values here are only per-method defaults.
#
# There are two top-level keys: `method:` (the catalog of base configs) and
# `variant:` (the run set — what run_test.jl actually fits).
#
# `method:` — one list entry per method; list order is the legend / table order.
#   name             method name; the --methods CLI token (case-insensitive)
#   separation_kind  which fitting algorithm to dispatch to
#   color            plot color: a palette index (Int) or a named color (crimson)
#   marker           plot marker
#   label            pretty name shown in legends and summary tables
#   kwargs           default arguments for the runner (keys differ per method).
#                    A bare word selects the matching option, e.g.
#                    step_rule: diminishing, classes: [ces, linear].
#   NOTE: write floats with a dot — 1.0e-3, not 1e-3 — otherwise YAML reads the
#         value as text instead of a number.
#
# `variant:` — THE RUN SET. run_test.jl fits every entry here (skip a few via
# SKIP_VARIANTS in that script). A variant reuses a catalog `method` (inheriting
# its separation_kind + kwargs) and layers `cli:` overrides on top (e.g.
# sample_hard, ad_delta_free — no-ops for methods that don't read them); a plain
# method is just a variant with an empty `cli:`. sym/color/marker/plotlabel give
# the variant its own plot series (sym must be unique).

# ============================ method catalog =================================
method:
  - name: CG
    separation_kind: cg_single
    color: 1
    marker: circle
    label: CG
    kwargs:
      max_iters: 500
      tol_obj: 1.0e-3
      tol_rc: 1.0e-5
      tol_delta: 1.0e-5
      drop: true
      classes: [ces, linear]

  - name: cgma
    separation_kind: cg_multicut
    color: 2
    marker: rect
    label: "CG(MA)"
    kwargs:
      max_iters: 500
      tol_obj: 1.0e-3
      tol_rc: 1.0e-3
      tol_delta: 1.0e-5
      tol_stage_2: 5.0e-4   # demote stage 2 → 1 on this looser stall
      drop: true
      classes: [ces]

  # Arrow–Debreu column generation: same CG loop with the AD master
  # (endowments b_t ∈ ℝⁿ₊, Σ_t b_t = 1, price-dependent budget ⟨p,b_t⟩).
  # separation_kind cg_ad routes run_one_method to run_ad_tracked.
  # Homothetic classes only (ces, linear); --classes overrides.
  - name: adcg
    separation_kind: cg_ad
    color: 7
    marker: pentagon
    label: AD-CG
    kwargs:
      max_iters: 500
      tol_obj: 1.0e-3
      tol_rc: 1.0e-5
      tol_delta: 1.0e-5
      drop: true
      classes: [ces]

  # FrankWolfe.jl
  - name: FWjl
    separation_kind: fwjl
    color: 3
    marker: rect
    label: FW.jl
    kwargs:
      max_iters: 3000
      tol_obj: 1.0e-3
      seed: 0

  # Arrow–Debreu via FrankWolfe.jl (δ = 1). Same AD problem as adcg but driven
  # by away_frank_wolfe over the bundle hull instead of the Gurobi master LP.
  # Homothetic classes only (no leontief); δ is fixed.
  - name: ADFWjl
    separation_kind: ad_fwjl
    color: 8
    marker: star6
    label: AD-FW.jl
    kwargs:
      max_iters: 3000
      tol_obj: 1.0e-3
      seed: 0
      classes: [ces]

  # Hand-rolled away-step FW (our own loop, no FrankWolfe.jl). There is no
  # separate "SFW" method — stochastic FW is just this FW run with subsampling:
  # pass --sample-size N (> 0) to make the LMO stochastic. sample_size: 0 here is
  # full-batch FW.
  - name: FW
    separation_kind: fw
    color: 4
    marker: diamond
    label: FW
    kwargs:
      max_iters: 3000
      sample_size: 0          # 0 → full batch; --sample-size N overrides for SFW
      tol_obj: 1.0e-3
      tol_delta: 1.0e-5
      step_rule: linesearch   # linesearch | diminishing
      away_steps: true
      seed: 0

  # Arrow–Debreu via our hand-rolled away-step FW (δ = 1). Same AD problem as
  # ADFWjl but driven by our own loop instead of FrankWolfe.jl — stopping is
  # tol_obj/tol_delta/max_iters/timelimit, never a (here unreliable) duality gap.
  - name: ADFW
    separation_kind: fw_ad
    color: 9
    marker: diamond
    label: AD-FW
    kwargs:
      max_iters: 1000
      sample_size: 0          # > 0 ⇒ stochastic LMO (SFW-style)
      tol_obj: 1.0e-3
      tol_delta: 1.0e-5
      step_rule: linesearch
      away_steps: true
      seed: 0
      classes: [ces]

  - name: ACCPM
    separation_kind: accpm
    color: 6
    marker: utriangle
    label: ACCPM
    kwargs:
      max_iters: 200
      tol_obj: 1.0e-3
      tol_rc: 1.0e-3
      tol_delta: 1.0e-5
      # Cuts must NOT be dropped in ACCPM: each γ_t is a polytope constraint
      # ⟨u, γ_t⟩ ≤ μ, and dropping it expands the polytope (the AC then moves
      # backward, undoing prior cuts). Vertex-CG can drop zero-weight columns
      # safely because the LP optimum is at a polytope vertex; ACCPM's AC
      # interior is a different object.
      drop: false
      classes: [ces, linear]
      # multicut defaults to false in run_method_tracked_accpm (K per-sample
      # inversions at the interior AC u are collectively redundant and inflate
      # the polytope without improving primal). Override here to opt in.
      interval_primal: 1   # refresh μ_ub + record primal_obj every iter

# ================================ run set ====================================
# The variants run_test.jl fits (in order). The adcg knobs (--sample-hard /
# --ad-delta-free) are set per variant under `cli`; they are no-ops for the
# CG / CG(MA) / FW.jl baselines. Add an entry to run another method/config.
variant:
  - label: CG
    method: CG
    sym: cg
    color: purple
    marker: pentagon
    plotlabel: CG
    cli:
      sample_hard: true
      ad_delta_free: false

  - label: "CG(MA)"
    method: cgma
    sym: cgma
    color: saddlebrown
    marker: star5
    plotlabel: "CG(MA)"
    cli:
      sample_hard: true
      ad_delta_free: false

  - label: "sample-hard + var-δ"
    method: adcg
    sym: adcg_hard_vardelta
    color: crimson
    marker: utriangle
    plotlabel: "sample-hard + var-delta"
    cli:
      sample_hard: true
      ad_delta_free: true

  - label: FW.jl
    method: FWjl
    sym: fwjl
    color: teal
    marker: xcross
    plotlabel: FW.jl
    cli:
      sample_hard: false
      ad_delta_free: false

  - label: AD-FW.jl
    method: ADFWjl
    sym: adfwjl
    color: darkgreen
    marker: star6
    plotlabel: AD-FW.jl
    cli:
      sample_hard: false
      ad_delta_free: false

  - label: FW
    method: FW
    sym: fw
    color: royalblue
    marker: diamond
    plotlabel: FW
    cli:
      sample_hard: false
      ad_delta_free: false

  - label: AD-FW
    method: ADFW
    sym: adfw
    color: darkorange
    marker: diamond
    plotlabel: AD-FW
    cli:
      sample_hard: false
      ad_delta_free: false
